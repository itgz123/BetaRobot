# SEGGER RTT 日志查看配置
# 使用方法: openocd -f openocd_rtt.cfg
# 连接方式: telnet 127.0.0.1 8888 或使用 PuTTY

# 调试器接口
source [find interface/cmsis-dap.cfg]

# 传输协议
transport select swd

# 目标芯片
source [find target/stm32f4x.cfg]

# 适配器速度
adapter speed 4000

# 初始化
init

# RTT 配置
# 起始地址: RAM 起始地址 (STM32F407 为 0x20000000)
# 搜索大小: 0x10000 (64KB)
# 标识字符串: 必须与源码中一致
rtt setup 0x20000000 0x10000 "SEGGER RTT"
rtt start

# 启动 RTT 服务器
# 端口 8888，通道 0
rtt server start 8888 0

echo "RTT Server started on port 8888"
echo "Connect with: telnet 127.0.0.1 8888"
